spring:
  application:
    name: carrito-compras-mvp

  datasource:
    url: jdbc:mysql://localhost:3306/carrito_compras_mvp?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
    username: root
    password: admin123

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
